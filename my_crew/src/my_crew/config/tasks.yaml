math_task:
  description: >
    create the steps needed to solve the math problem {problem}
  expected_output: >
    A list with the steps needed to solve the math problem {problem}
  agent: math_teacher

python_task:
  description: >
    create a python script that solves the math problem {problem} with the steps from the last agent
  expected_output: >
    A python script that solves the math problem {problem}
    without ``` and ``` at the beginning and end
    The output should be only a valid python code
  agent: python_developer